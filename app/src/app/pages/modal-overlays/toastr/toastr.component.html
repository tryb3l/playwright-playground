<mat-card class="toast-card">
  <mat-card-header>
    <mat-card-title>Toaster configuration</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <div class="toast-grid">
      <div class="toast-grid__column">
        <mat-form-field appearance="outline">
          <mat-label>Position</mat-label>
          <mat-select [(ngModel)]="position" name="position">
            @for (p of positions; track p) {
            <mat-option [value]="p">{{ p }}</mat-option>
            }
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Title</mat-label>
          <input matInput [(ngModel)]="title" name="title" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Content</mat-label>
          <input matInput [(ngModel)]="content" name="content" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Time to hide toast, ms. 0 to persist</mat-label>
          <input matInput type="number" [(ngModel)]="duration" name="timeout" />
        </mat-form-field>
      </div>

      <div class="toast-grid__column">
        <mat-form-field appearance="outline">
          <mat-label>Toast type</mat-label>
          <mat-select [(ngModel)]="status" name="status">
            @for (t of types; track t) {
            <mat-option [value]="t">{{ t }}</mat-option>
            }
          </mat-select>
        </mat-form-field>

        <mat-checkbox [(ngModel)]="destroyByClick" name="destroyByClick">
          Hide on click
        </mat-checkbox>
        <mat-checkbox [(ngModel)]="preventDuplicates" name="preventDuplicates">
          Prevent arising of duplicate toast
        </mat-checkbox>
        <mat-checkbox [(ngModel)]="hasIcon" name="hasIcon">
          Show toast with icon
        </mat-checkbox>
      </div>
    </div>
  </mat-card-content>

  <mat-card-actions class="toast-actions">
    <button mat-flat-button type="button" color="primary" (click)="makeToast()">
      Show toast
    </button>
    <button mat-stroked-button type="button" (click)="openRandomToast()">
      Random toast
    </button>
  </mat-card-actions>
</mat-card>
