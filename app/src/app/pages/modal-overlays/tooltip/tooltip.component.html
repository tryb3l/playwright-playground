<div class="tooltip-grid">
  <mat-card class="tooltip-card">
    <mat-card-header>
      <mat-card-title>Tooltip With Icon</mat-card-title>
    </mat-card-header>

    <mat-card-content class="tooltip-card__content tooltip-card__actions">
      @for (button of iconButtons; track button.id) {
      <button mat-stroked-button type="button" class="tooltip-button" [attr.data-testid]="button.id"
        [matTooltip]="button.message" [matTooltipPosition]="button.position"
        [matTooltipClass]="getTooltipClasses(button.status)">
        @if (button.iconClass; as iconClass) {
        <span class="fa-solid" [ngClass]="iconClass" aria-hidden="true"></span>
        }
        {{ button.label }}
      </button>
      }
    </mat-card-content>
  </mat-card>

  <mat-card class="tooltip-card">
    <mat-card-header>
      <mat-card-title>Tooltip Placements</mat-card-title>
    </mat-card-header>

    <mat-card-content class="tooltip-card__content tooltip-card__actions">
      @for (button of placementButtons; track button.id) {
      <button mat-stroked-button type="button" class="tooltip-button" [attr.data-testid]="button.id"
        [matTooltip]="button.message" [matTooltipPosition]="button.position"
        [matTooltipClass]="getTooltipClasses(button.status)">
        {{ button.label }}
      </button>
      }
    </mat-card-content>
  </mat-card>

  <mat-card class="tooltip-card">
    <mat-card-header>
      <mat-card-title>Colored Tooltips</mat-card-title>
    </mat-card-header>

    <mat-card-content class="tooltip-card__content tooltip-card__actions">
      @for (button of colorButtons; track button.id) {
      <button mat-stroked-button type="button" class="tooltip-button" [attr.data-testid]="button.id"
        [matTooltip]="button.message" [matTooltipPosition]="button.position"
        [matTooltipClass]="getTooltipClasses(button.status)">
        {{ button.label }}
      </button>
      }
    </mat-card-content>
  </mat-card>
</div>
