<mat-card>
  <mat-card-header>Enter your name</mat-card-header>
  <mat-card-content>
    <input #name matInput placeholder="Name" />
  </mat-card-content>
  <mat-card-footer>
    <button class="cancel" mat-button color="warn" (click)="cancel()">
      Cancel
    </button>
    <button mat-button color="accent" (click)="submit(name.value)">
      Submit
    </button>
  </mat-card-footer>
</mat-card>
