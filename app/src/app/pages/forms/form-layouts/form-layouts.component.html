<div class="row">
  <div class="col-md-12">
    <mat-card class="app-form-card inline-form-card" data-testid="inline-form-card">
      <mat-card-header>
        <mat-card-title>Inline form</mat-card-title>
      </mat-card-header>

      <mat-card-content>
        <form class="form-inline" (ngSubmit)="onSubmit()">
          <mat-form-field appearance="outline" class="app-form-field form-inline__field">
            <input matInput type="text" placeholder="Jane Doe" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="app-form-field form-inline__field">
            <input matInput type="email" placeholder="Email" />
          </mat-form-field>

          <mat-checkbox>Remember me</mat-checkbox>

          <button type="submit" mat-flat-button>Submit</button>
        </form>
      </mat-card-content>
    </mat-card>
  </div>
</div>

<div class="row">
  <div class="col-md-6">
    <mat-card class="app-form-card grid-form-card" data-testid="grid-form-card">
      <mat-card-header>
        <mat-card-title>Using the Grid</mat-card-title>
      </mat-card-header>

      <mat-card-content>
        <form class="form-grid" (ngSubmit)="onSubmit()">
          <div class="form-group row">
            <label for="inputEmail1" class="label col-sm-3 col-form-label">Email</label>
            <div class="col-sm-9">
              <mat-form-field appearance="outline" class="app-form-field">
                <input matInput type="email" id="inputEmail1" placeholder="Email" />
              </mat-form-field>
            </div>
          </div>

          <div class="form-group row">
            <label for="inputPassword2" class="label col-sm-3 col-form-label">Password</label>
            <div class="col-sm-9">
              <mat-form-field appearance="outline" class="app-form-field">
                <input matInput type="password" id="inputPassword2" placeholder="Password" />
              </mat-form-field>
            </div>
          </div>

          <div class="form-group row">
            <label class="col-sm-3 label">Radios</label>
            <div class="col-sm-9">
              <mat-radio-group aria-label="Radios" class="form-grid__radio-group">
                <mat-radio-button value="option-1">Option 1</mat-radio-button>
                <mat-radio-button value="option-2">Option 2</mat-radio-button>
                <mat-radio-button value="disabled-option" disabled>Disabled Option</mat-radio-button>
              </mat-radio-group>
            </div>
          </div>

          <div class="form-group row">
            <div class="offset-sm-3 col-sm-9">
              <button type="submit" mat-flat-button>Submit</button>
            </div>
          </div>
        </form>
      </mat-card-content>
    </mat-card>

    <mat-card class="app-form-card no-labels-card">
      <mat-card-header>
        <mat-card-title>Form without labels</mat-card-title>
      </mat-card-header>

      <mat-card-content>
        <form class="form-no-labels" (ngSubmit)="onSubmit()">
          <div class="form-group">
            <mat-form-field appearance="outline" class="app-form-field">
              <input matInput type="text" placeholder="Recipients" />
            </mat-form-field>
          </div>

          <div class="form-group">
            <mat-form-field appearance="outline" class="app-form-field">
              <input matInput type="text" placeholder="Subject" />
            </mat-form-field>
          </div>

          <div class="form-group">
            <mat-form-field appearance="outline" class="app-form-field">
              <textarea matInput placeholder="Message" rows="4"></textarea>
            </mat-form-field>
          </div>

          <button type="submit" mat-flat-button>Send</button>
        </form>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="col-md-6">
    <mat-card class="app-form-card">
      <mat-card-header>
        <mat-card-title>Basic form</mat-card-title>
      </mat-card-header>

      <mat-card-content>
        <form class="form-basic" (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label for="exampleInputEmail1" class="label">Email address</label>
            <mat-form-field appearance="outline" class="app-form-field">
              <input matInput type="email" id="exampleInputEmail1" placeholder="Email" />
            </mat-form-field>
          </div>

          <div class="form-group">
            <label for="exampleInputPassword1" class="label">Password</label>
            <mat-form-field appearance="outline" class="app-form-field">
              <input matInput type="password" id="exampleInputPassword1" placeholder="Password" />
            </mat-form-field>
          </div>

          <div class="form-group">
            <mat-checkbox>Check me out</mat-checkbox>
          </div>

          <button type="submit" mat-flat-button>Submit</button>
        </form>
      </mat-card-content>
    </mat-card>

    <mat-card class="app-form-card block-form-card">
      <mat-card-header>
        <mat-card-title>Block form</mat-card-title>
      </mat-card-header>

      <mat-card-content>
        <form class="form-block" (ngSubmit)="onSubmit()">
          <div class="row">
            <div class="col-sm-6">
              <div class="form-group">
                <label for="inputFirstName" class="label">First Name</label>
                <mat-form-field appearance="outline" class="app-form-field">
                  <input matInput type="text" id="inputFirstName" placeholder="First Name" />
                </mat-form-field>
              </div>
            </div>

            <div class="col-sm-6">
              <div class="form-group">
                <label for="inputLastName" class="label">Last Name</label>
                <mat-form-field appearance="outline" class="app-form-field">
                  <input matInput type="text" id="inputLastName" placeholder="Last Name" />
                </mat-form-field>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-sm-6">
              <div class="form-group">
                <label for="inputEmail" class="label">Email</label>
                <mat-form-field appearance="outline" class="app-form-field">
                  <input matInput type="email" id="inputEmail" placeholder="Email" />
                </mat-form-field>
              </div>
            </div>

            <div class="col-sm-6">
              <div class="form-group">
                <label for="inputWebsite" class="label">Website</label>
                <mat-form-field appearance="outline" class="app-form-field">
                  <input matInput type="text" id="inputWebsite" placeholder="Website" />
                </mat-form-field>
              </div>
            </div>
          </div>

          <button type="submit" mat-flat-button>Submit</button>
        </form>
      </mat-card-content>
    </mat-card>
  </div>
</div>

<div class="row">
  <div class="col-md-6">
    <mat-card class="app-form-card horizontal-form-card">
      <mat-card-header>
        <mat-card-title>Horizontal form</mat-card-title>
      </mat-card-header>

      <mat-card-content>
        <form class="form-horizontal" (ngSubmit)="onSubmit()">
          <div class="form-group row">
            <label for="inputEmail3" class="label col-sm-3 form-control-label">Email</label>
            <div class="col-sm-9">
              <mat-form-field appearance="outline" class="app-form-field">
                <input matInput type="email" id="inputEmail3" placeholder="Email" />
              </mat-form-field>
            </div>
          </div>

          <div class="form-group row">
            <label for="inputPassword3" class="label col-sm-3 form-control-label">Password</label>
            <div class="col-sm-9">
              <mat-form-field appearance="outline" class="app-form-field">
                <input matInput type="password" id="inputPassword3" placeholder="Password" />
              </mat-form-field>
            </div>
          </div>

          <div class="form-group row">
            <div class="offset-sm-3 col-sm-9">
              <div class="checkbox">
                <mat-checkbox>Remember me</mat-checkbox>
              </div>
            </div>
          </div>

          <div class="form-group row">
            <div class="offset-sm-3 col-sm-9">
              <button type="submit" mat-flat-button>Sign in</button>
            </div>
          </div>
        </form>
      </mat-card-content>
    </mat-card>
  </div>
</div>
