<mat-card>
  <mat-card-content>
    <mat-form-field>
      <mat-label>Search</mat-label>
      <input
        matInput
        (keyup)="dataSource.filter = $any($event.target).value"
        placeholder="Ex. Projects"
        #input
      />
    </mat-form-field>

    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
      <!-- Name Column -->
      <ng-container [matColumnDef]="customColumn">
        <th mat-header-cell *matHeaderCellDef>{{ customColumn }}</th>
        <td mat-cell *matCellDef="let row">
          <ngx-fs-icon [kind]="row.kind"></ngx-fs-icon>
          {{ row[customColumn] }}
        </td>
      </ng-container>

      @for (column of defaultColumns; track column) {
        <ng-container [matColumnDef]="column">
          <th mat-header-cell *matHeaderCellDef>{{ column }}</th>
          <td mat-cell *matCellDef="let row">{{ row[column] || '-' }}</td>
        </ng-container>
      }

      <tr mat-header-row *matHeaderRowDef="allColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: allColumns"></tr>

      <!-- Row shown when there is no matching data. -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="4">
          No data matching the filter "{{ input.value }}"
        </td>
      </tr>
    </table>
  </mat-card-content>
</mat-card>
