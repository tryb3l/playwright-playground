<mat-card class="table-card smart-table-card" data-testid="smart-table-card">
  <mat-card-header>
    <mat-card-title>Smart Table</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <angular2-smart-table
      [settings]="settings"
      [source]="source"
      (deleteConfirm)="onDeleteConfirm($event)"
    >
    </angular2-smart-table>
  </mat-card-content>
</mat-card>
