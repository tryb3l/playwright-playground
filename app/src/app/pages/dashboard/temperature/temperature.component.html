<mat-card>
  <mat-tab-group>
    <mat-tab label="Temperature">
      <div class="slider-container">
        <ngx-temperature-dragger
          [(value)]="temperature"
          (power)="temperatureOff = !$event"
          [min]="temperatureData.min"
          [max]="temperatureData.max"
          [disableArcColor]="theme.arcEmpty"
          [fillColors]="theme.arcFill"
          [thumbBg]="theme.thumbBg"
          [thumbBorderColor]="theme.thumbBorder"
        >
          <div
            class="slider-value-container"
            [ngClass]="{ off: temperatureOff }"
          >
            <div class="value temperature h1">
              {{ temperatureOff ? '--' : (temperature | ngxRound) }}
            </div>
            <div class="desc">Celsius</div>
          </div>
        </ngx-temperature-dragger>
      </div>

      <mat-radio-group [(ngModel)]="temperatureMode" name="temperature-mode">
        <mat-radio-button value="cool">
          <mat-icon>ac_unit</mat-icon>
        </mat-radio-button>
        <mat-radio-button value="warm">
          <mat-icon>wb_sunny</mat-icon>
        </mat-radio-button>
        <mat-radio-button value="heat">
          <mat-icon>whatshot</mat-icon>
        </mat-radio-button>
        <mat-radio-button value="fan">
          <mat-icon>loop</mat-icon>
        </mat-radio-button>
      </mat-radio-group>
    </mat-tab>

    <mat-tab label="Humidity">
      <div class="slider-container">
        <ngx-temperature-dragger
          [(value)]="humidity"
          (power)="humidityOff = !$event"
          [min]="humidityData.min"
          [max]="humidityData.max"
          [disableArcColor]="theme.arcEmpty"
          [fillColors]="theme.arcFill"
          [thumbBg]="theme.thumbBg"
          [thumbBorderColor]="theme.thumbBorder"
        >
          <div class="slider-value-container" [ngClass]="{ off: humidityOff }">
            <div class="value humidity h1">
              {{ humidityOff ? '--' : (humidity | ngxRound) }}
            </div>
          </div>
        </ngx-temperature-dragger>
      </div>

      <mat-radio-group [(ngModel)]="humidityMode" name="humidity-mode">
        <mat-radio-button value="cool">
          <mat-icon>ac_unit</mat-icon>
        </mat-radio-button>
        <mat-radio-button value="warm">
          <mat-icon>wb_sunny</mat-icon>
        </mat-radio-button>
        <mat-radio-button value="heat">
          <mat-icon>whatshot</mat-icon>
        </mat-radio-button>
        <mat-radio-button value="fan">
          <mat-icon>loop</mat-icon>
        </mat-radio-button>
      </mat-radio-group>
    </mat-tab>
  </mat-tab-group>
</mat-card>
