<mat-card>
  <mat-card-header>
    <mat-card-title>Security Cameras</mat-card-title>
    <div class="view-actions">
      <button
        class="single-view-button"
        mat-icon-button
        (click)="isSingleView = true"
        aria-label="Single view"
      >
        <mat-icon>crop_square</mat-icon>
      </button>
      <button
        class="grid-view-button"
        mat-icon-button
        (click)="isSingleView = false"
        aria-label="Grid view"
      >
        <mat-icon>grid_view</mat-icon>
      </button>
    </div>
  </mat-card-header>

  <div class="grid-container">
    @if (isSingleView && selectedCamera) {
      <div class="single-view">
        <div
          class="camera"
          [style.background-image]="'url(' + selectedCamera.source + ')'"
        >
          <span class="camera-name">{{ selectedCamera.title }}</span>
        </div>
      </div>
    }

    @if (!isSingleView) {
      <div class="grid-view">
        @for (camera of cameras; track camera) {
          <div
            class="camera"
            [style.background-image]="'url(' + camera.source + ')'"
            (click)="selectCamera(camera)"
          >
            <span class="camera-name">{{ camera.title }}</span>
          </div>
        }
      </div>
    }
  </div>

  <mat-card-footer>
    <mat-toolbar class="camera-toolbar">
      <button mat-button>
        <mat-icon>pause_circle</mat-icon>
        <span>Pause</span>
      </button>
      <button mat-button>
        <mat-icon>list</mat-icon>
        <span>Logs</span>
      </button>
      <button mat-button>
        <mat-icon>search</mat-icon>
        <span>Search</span>
      </button>
      <button mat-button>
        <mat-icon>settings</mat-icon>
        <span>Setup</span>
      </button>
    </mat-toolbar>
  </mat-card-footer>
</mat-card>
