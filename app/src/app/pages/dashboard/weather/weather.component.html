<section class="weather-card" data-testid="dashboard-weather-card">
  <div class="weather-card__body">
    <span class="h3 location" data-testid="dashboard-weather-location">New York</span>
    <span class="date">Mon 29 May</span>

    <div class="today">
      <span class="today-temperature h1">20&deg;</span>
      <span class="today-icon fa-solid fa-sun" aria-hidden="true"></span>
    </div>

    <div class="today-details">
      <div class="parameter">
        <span class="caption parameter-name">max</span>
        <span class="parameter-value">23&deg;</span>
      </div>
      <div class="parameter">
        <span class="caption parameter-name">min</span>
        <span class="parameter-value">19&deg;</span>
      </div>
      <div class="parameter">
        <span class="caption parameter-name">wind</span>
        <span class="parameter-value">4 km/h</span>
      </div>
      <div class="parameter">
        <span class="caption parameter-name">hum</span>
        <span class="parameter-value">87%</span>
      </div>
    </div>

    <div class="weekly-forecast" data-testid="dashboard-weather-forecast">
      <div class="day" data-testid="dashboard-weather-day-sun">
        <span class="caption">Sun</span>
        <span class="weather-icon fa-solid fa-cloud" aria-hidden="true"></span>
        <span class="temperature">17&deg;</span>
      </div>
      <div class="day" data-testid="dashboard-weather-day-mon">
        <span class="caption">Mon</span>
        <span class="weather-icon fa-solid fa-sun" aria-hidden="true"></span>
        <span class="temperature">19&deg;</span>
      </div>
      <div class="day" data-testid="dashboard-weather-day-tue">
        <span class="caption">Tue</span>
        <span class="weather-icon fa-solid fa-cloud-rain" aria-hidden="true"></span>
        <span class="temperature">22&deg;</span>
      </div>
      <div class="day" data-testid="dashboard-weather-day-wed">
        <span class="caption">Wed</span>
        <span class="weather-icon fa-solid fa-cloud-sun" aria-hidden="true"></span>
        <span class="temperature">21&deg;</span>
      </div>
    </div>
  </div>
</section>
