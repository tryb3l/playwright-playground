<div class="dashboard-shell">
  <div class="row">
    @for (statusCard of statusCards; track statusCard) {
    <div class="col-xxxl-3 col-md-6">
      <ngx-status-card [title]="statusCard.title" [type]="statusCard.type">
        <i [ngClass]="statusCard.iconClass"></i>
      </ngx-status-card>
    </div>
    }
  </div>

  <div class="row">
    <div class="col-xxxl-3 col-xxl-4 col-lg-5 col-md-6">
      <ngx-temperature></ngx-temperature>
    </div>

    <div class="col-xxxl-9 col-xxl-8 col-lg-7 col-md-6">
      <ngx-electricity></ngx-electricity>
    </div>
  </div>

  <section class="dashboard-living-layout" data-testid="dashboard-living-layout">
    <div class="dashboard-main-column" data-testid="dashboard-main-column">
      <div class="dashboard-widget-shell dashboard-widget-shell--rooms">
        <ngx-rooms></ngx-rooms>
      </div>

      <div class="dashboard-widget-shell dashboard-widget-shell--security">
        <ngx-security-cameras></ngx-security-cameras>
      </div>
    </div>

    <div class="dashboard-sidebar-column" data-testid="dashboard-sidebar-column">
      <div class="dashboard-widget-shell dashboard-widget-shell--contacts">
        <ngx-contacts></ngx-contacts>
      </div>

      <div class="dashboard-widget-shell dashboard-widget-shell--solar">
        <ngx-solar [chartValue]="solarValue"></ngx-solar>
      </div>

      <div class="dashboard-widget-shell dashboard-widget-shell--kitten">
        <ngx-kitten></ngx-kitten>
      </div>

      <div class="dashboard-widget-shell dashboard-widget-shell--traffic">
        <ngx-traffic></ngx-traffic>
      </div>

      <div class="dashboard-widget-shell dashboard-widget-shell--weather">
        <ngx-weather></ngx-weather>
      </div>
    </div>
  </section>
</div>
