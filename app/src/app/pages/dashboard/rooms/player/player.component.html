<mat-card>
  <mat-card-header class="header">My Playlist</mat-card-header>

  <mat-card-content class="body">
    <div class="track-info">
      <div
        class="cover"
        style.background-image="url('{{ track.cover }}')"
      ></div>
      <div class="details">
        <h4 [class.subtitle]="collapsed">{{ track.name }}</h4>
        <span>{{ track.artist }}</span>
      </div>
    </div>

    <div class="progress-wrap">
      <input
        dir="ltr"
        type="range"
        class="progress"
        [value]="getProgress()"
        min="0"
        max="100"
        step="0.01"
        (input)="setProgress(duration.value)"
        #duration
      />
      <div class="progress-foreground" [style.width.%]="getProgress()"></div>
    </div>

    <div class="timing">
      <small class="current">{{ player.currentTime | timing }}</small>
      <small class="remaining"
        >- {{ player.duration - player.currentTime | timing }}</small
      >
    </div>

    <div class="controls">
      <button
        class="control-button"
        mat-button
        (click)="toggleShuffle()"
        [class.on]="shuffle"
      >
        <mat-icon>shuffle</mat-icon>
      </button>
      <button class="control-button" mat-button (click)="prev()">
        <mat-icon>skip_previous</mat-icon>
      </button>
      <button
        class="control-button play-button"
        mat-button
        (click)="playPause()"
      >
        <mat-icon class="play">{{
          player.paused ? 'play_arrow' : 'pause'
        }}</mat-icon>
      </button>
      <button
        class="control-button skip-forward-button"
        mat-button
        (click)="next()"
      >
        <mat-icon>skip_next</mat-icon>
      </button>
      <button
        class="control-button"
        mat-button
        (click)="toggleLoop()"
        [class.on]="player.loop"
      >
        <mat-icon>repeat</mat-icon>
      </button>
    </div>
  </mat-card-content>

  <mat-card-footer class="footer">
    <div class="volume">
      <button mat-button (click)="setVolume(0)">
        <mat-icon>volume_down</mat-icon>
      </button>
      <div class="progress-wrap">
        <input
          type="range"
          class="progress"
          [value]="getVolume()"
          max="100"
          (input)="setVolume(volume.value)"
          #volume
        />
        <div class="progress-foreground" [style.width.%]="getVolume()"></div>
      </div>
      <button mat-button (click)="setVolume(100)">
        <mat-icon>volume_up</mat-icon>
      </button>
    </div>
  </mat-card-footer>
</mat-card>
