<section class="player-card" data-testid="dashboard-player-card">
  <header class="header">My Playlist</header>

  <div class="body">
    <div class="track-info">
      <div class="cover" style.background-image="url('{{track.cover}}')"></div>
      <div class="details">
        <h4 [class.subtitle]="collapsed" data-testid="dashboard-player-track-name">{{ track.name }}</h4>
        <span>{{ track.artist }}</span>
      </div>
    </div>

    <div class="progress-wrap">
      <input dir="ltr" type="range" class="progress" [value]="getProgress()" min="0" max="100" step="0.01"
        (input)="setProgress(duration.value)" #duration>
      <div class="progress-foreground" [style.width.%]="getProgress()"></div>
    </div>

    <div class="timing">
      <small class="current">{{ player.currentTime | timing }}</small>
      <small class="remaining">- {{ player.duration - player.currentTime | timing }}</small>
    </div>

    <div class="controls">
      <button type="button" class="control-button control-button--small" data-testid="dashboard-player-shuffle-button"
        (click)="toggleShuffle()" [class.on]="shuffle" [attr.aria-pressed]="shuffle" aria-label="Toggle shuffle">
        <span class="fa-solid fa-shuffle" aria-hidden="true"></span>
      </button>
      <button type="button" class="control-button control-button--medium" data-testid="dashboard-player-prev-button"
        (click)="prev()" aria-label="Previous track">
        <span class="fa-solid fa-backward-step skip" aria-hidden="true"></span>
      </button>
      <button type="button" class="control-button control-button--medium play-button"
        data-testid="dashboard-player-play-button" (click)="playPause()" [attr.aria-pressed]="!player.paused"
        aria-label="Play or pause">
        <span class="fa-regular play" [class.fa-circle-play]="player.paused" [class.fa-circle-pause]="!player.paused"
          aria-hidden="true"></span>
      </button>
      <button type="button" class="control-button control-button--medium skip-forward-button"
        data-testid="dashboard-player-next-button" (click)="next()" aria-label="Next track">
        <span class="fa-solid fa-forward-step skip" aria-hidden="true"></span>
      </button>
      <button type="button" class="control-button control-button--small" data-testid="dashboard-player-loop-button"
        (click)="toggleLoop()" [class.on]="player.loop" [attr.aria-pressed]="player.loop" aria-label="Toggle loop">
        <span class="fa-solid fa-repeat" aria-hidden="true"></span>
      </button>
    </div>
  </div>

  <footer class="footer">
    <div class="volume">
      <button type="button" class="volume-button" data-testid="dashboard-player-volume-down-button"
        (click)="setVolume(0)" aria-label="Mute">
        <span class="fa-solid fa-volume-low volume-icon" aria-hidden="true"></span>
      </button>
      <div class="progress-wrap">
        <input type="range" class="progress" [value]="getVolume()" max="100" (input)="setVolume(volume.value)" #volume>
        <div class="progress-foreground" [style.width.%]="getVolume()"></div>
      </div>
      <button type="button" class="volume-button" data-testid="dashboard-player-volume-up-button"
        (click)="setVolume(100)" aria-label="Max volume">
        <span class="fa-solid fa-volume-high volume-icon" aria-hidden="true"></span>
      </button>
    </div>
  </footer>
</section>
