<section class="electricity-widget" data-testid="dashboard-electricity-widget">
  <section class="electricity-card electricity-list-card" data-testid="dashboard-electricity-list-card">
    <header class="electricity-card__header">Electricity Consumption</header>

    @if (activeYear; as year) {
      <div class="electricity-year-tabs" role="tablist" aria-label="Electricity year tabs">
        @for (item of listData; track item.title) {
          <button
            type="button"
            class="electricity-year-tab"
            [class.electricity-year-tab--active]="selectedYearTitle === item.title"
            [attr.aria-pressed]="selectedYearTitle === item.title"
            [attr.data-testid]="'dashboard-electricity-year-' + item.title"
            (click)="setActiveYear(item.title)"
          >
            {{ item.title }}
          </button>
        }
      </div>

      <div class="electricity-list" data-testid="dashboard-electricity-year-panel">
        @for (month of year.months; track month.month) {
          <div class="electricity-list-row">
            <span class="month">{{ month.month }}</span>
            <span class="delta">
              <span
                class="fa-solid"
                [class.electricity-icon--down]="month.down"
                [class.electricity-icon--up]="!month.down"
                [class.fa-arrow-trend-down]="month.down"
                [class.fa-arrow-trend-up]="!month.down"
                aria-hidden="true"
              ></span>
              {{ month.delta }}
            </span>
            <span class="results">
              {{ month.kWatts }} <span class="caption">kWh</span> /
              {{ month.cost }} <span class="caption">USD</span>
            </span>
          </div>
        }
      </div>
    }
  </section>

  <section class="electricity-card electricity-chart-card" data-testid="dashboard-electricity-chart-card">
    <header class="electricity-card__header electricity-card__header--chart">
      <span class="stats">
        <span class="caption">Consumed</span>
        <span>816 <span class="caption">kWh</span></span>
      </span>
      <span class="stats">
        <span class="caption">Spent</span>
        <span>291 <span class="caption">USD</span></span>
      </span>

      <label class="type-select">
        <span class="sr-only">Electricity period</span>
        <select [(ngModel)]="type" data-testid="dashboard-electricity-period-select">
          @for (t of types; track t) {
            <option [value]="t">{{ t }}</option>
          }
        </select>
      </label>
    </header>

    <div class="electricity-chart-surface">
      <ngx-electricity-chart [data]="chartData"></ngx-electricity-chart>
    </div>
  </section>
</section>
