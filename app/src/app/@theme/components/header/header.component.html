<div class="header-bar">
  <div class="brand-group">
    <button type="button" class="icon-button" aria-label="Toggle navigation" (click)="toggleSidebar()">
      <span class="fa-solid fa-bars" aria-hidden="true"></span>
    </button>

    <a class="brand-link" href="/" (click)="navigateHome(); $event.preventDefault()">
      PW-<span>test</span>
    </a>
  </div>

  <div class="header-actions">
    <mat-form-field appearance="outline" class="theme-field">
      <mat-label>Theme</mat-label>
      <mat-select data-testid="theme-select" [value]="currentTheme" [panelClass]="'theme-select-panel'"
        (valueChange)="changeTheme($event)">
        @for (theme of themes; track theme.name) {
        <mat-option [value]="theme.name" [attr.data-testid]="'theme-option-' + theme.name">
          {{ theme.label }}
        </mat-option>
        }
      </mat-select>
    </mat-form-field>

    @if (user; as currentUser) {
    <div class="user-pill">
      @if (!userPictureOnly) {
      <span class="user-pill__label">{{ currentUser.name }}</span>
      }

      <img class="user-pill__avatar" [src]="currentUser.picture" [alt]="currentUser.name" />
    </div>
    }
  </div>
</div>
